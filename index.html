<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>SISTEMA // OBSERVADOR</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle at center, #00110d 0%, #000000 70%);
    color:#00ff9f;
    font-family: 'Courier New', monospace;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    overflow:hidden;
}

/* scanlines */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,159,0.03),
        rgba(0,255,159,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
}

input, button{
    margin-top:10px;
    padding:12px;
    background:rgba(0,0,0,0.6);
    border:1px solid #00ff9f;
    color:#00ff9f;
    outline:none;
    text-align:center;
    border-radius:4px;
}

button:hover{
    background:#00ff9f;
    color:black;
}

.glitch{
    animation:glitch 0.15s infinite;
}

@keyframes glitch{
    0%{transform:translate(0px,0px);}
    25%{transform:translate(1px,-1px);}
    50%{transform:translate(-1px,1px);}
    75%{transform:translate(1px,1px);}
    100%{transform:translate(0px,0px);}
}

.page{
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
    position:fixed;
    top:0;
    left:0;
    opacity:0;
    transition:0.3s ease;
}

.active{
    display:flex !important;
    opacity:1;
}

h1,h2{
    letter-spacing:2px;
    text-shadow:0 0 10px #00ff9f33;
}

#autoMsg{
    position:fixed;
    bottom:20px;
    right:20px;
    color:#00ff9f;
    max-width:320px;
    opacity:0.9;
    padding:10px;
    border-left:2px solid #00ff9f;
    background:rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
    <h1>SISTEMA // OBSERVADOR</h1>

    <p>IDENTIFIQUE-SE</p>
    <input id="nameInput" placeholder="Seu nome...">
    <button onclick="setName()">CONFIRMAR</button>

    <br><br>

    <p>DIGITE O CÓDIGO</p>
    <input id="code" onkeyup="check()" placeholder="...">

    <p id="response"></p>
</div>

<!-- NODE 1 -->
<div id="node1" class="page">
    <h2>NODE 01</h2>
    <p>> ACCESS LOG: OK</p>
</div>

<!-- NODE 2 -->
<div id="nodeWalk" class="page">
    <h2>NODE 02</h2>
    <p>> HE IS NOT WALKING</p>
</div>

<!-- NODE 3 -->
<div id="node3" class="page">
    <h2>NODE 03</h2>
    <p>> SIGNAL DETECTED</p>
</div>

<!-- NODE 4 -->
<div id="node4" class="page">
    <h2>NODE 04 // HIDDEN</h2>
    <p>> SYSTEM IS LEARNING YOU</p>
</div>

<!-- FINAL -->
<div id="final" class="page">
    <h1 style="color:red;">SYSTEM OVERLOAD</h1>
    <p id="count"></p>
    <p id="end" style="display:none;">ENTITY TERMINATED</p>
</div>

<!-- AUTO MSG -->
<div id="autoMsg"></div>

<script>

/* =========================
   BASE
========================= */
const messages = [
    "/// OBSERVING USER...",
    "SIGNAL STABILITY: LOW",
    "IT IS STILL HERE",
    "NODE ACTIVE",
    "SYSTEM WATCHING"
];

let msgIndex = 0;

/* =========================
   MEMÓRIA
========================= */
let memory = JSON.parse(localStorage.getItem("observer_memory")) || [];
let userName = localStorage.getItem("observer_name") || "";

function remember(e){
    if(!memory.includes(e)){
        memory.push(e);
        localStorage.setItem("observer_memory", JSON.stringify(memory));
    }
}

function hasMemory(e){
    return memory.includes(e);
}

/* =========================
   NOME
========================= */
function setName(){
    let name = document.getElementById("nameInput").value;
    if(!name) return;

    userName = name;
    localStorage.setItem("observer_name", name);

    remember("user_identified");

    document.getElementById("response").innerHTML =
    "> " + name + ", você está sendo observado 👁️";
}

/* =========================
   AUTO MSG
========================= */
function autoMessages(){
    let box = document.getElementById("autoMsg");

    let dynamic = [...messages];

    if(userName){
        dynamic.push(userName.toUpperCase() + " DETECTED");
    }

    box.innerText = dynamic[msgIndex % dynamic.length];
    msgIndex++;
}

setInterval(autoMessages, 3000);

/* =========================
   NAVEGAÇÃO SEGURA
========================= */
function showPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    let el = document.getElementById(id);
    if(el) el.classList.add("active");
}

/* =========================
   CHECK
========================= */
function check(){
    let v = document.getElementById("code").value.toUpperCase();
    let r = document.getElementById("response");

    if(v === "HELLO"){
        showPage("node1");
        r.innerHTML = "> ACCESS GRANTED";
    }

    if(v === "HE_IS_NOT_WALKING"){
        showPage("nodeWalk");
    }

    if(v === "SIGNAL"){
        showPage("node3");
    }

    if(v === "VOID"){
        remember("node4_seen");
        showPage("node4");
    }

    if(v === "TERMINATE"){
        startFinal();
    }
}

/* =========================
   FINAL
========================= */
function startFinal(){
    showPage("final");

    let c = 5;
    let count = document.getElementById("count");

    let i = setInterval(()=>{
        count.innerText = "TERMINATING IN " + c;
        c--;

        document.body.classList.add("glitch");

        if(c < 0){
            clearInterval(i);
            document.getElementById("end").style.display = "block";

            setTimeout(()=>{
                document.body.innerHTML =
                "<h1 style='color:red;margin-top:40vh;'>SIGNAL LOST</h1>";
            },2000);
        }
    },1000);
}

/* =========================
   FIX ANTI-TELA-PRETA
========================= */
window.onload = () => {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("home").classList.add("active");
};

</script>

</body>
</html>
